<nav
  #navbar
  aria-label="Navegacao principal"
  class="page-container sticky top-0 z-50 bg-surface/90 py-1 shadow-[0_4px_20px_rgba(27,58,87,0.06)] backdrop-blur will-change-transform"
>
  <div class="flex h-16 items-center justify-between">
    <div class="flex flex-1 items-center justify-start">
      <a
        routerLink="/"
        aria-label="Ir para a pagina inicial da InfraJoint"
        class="flex items-center"
      >
        <img
          ngSrc="assets/images/logo.png"
          width="1518"
          height="377"
          sizes="(min-width: 1024px) 12vw, (min-width: 640px) 18vw, 32vw"
          alt="InfraJoint"
          class="h-6 w-auto object-contain sm:h-10 lg:h-11"
        />
      </a>
    </div>

    @if (showSiteLinks()) {
      <div class="flex flex-1 items-center justify-center gap-4 sm:gap-9">
        <a
          routerLink="/"
          class="nav-link"
        >
          Home
        </a>

        <a
          routerLink="/"
          fragment="recursos"
          class="nav-link"
        >
          Recursos
        </a>

        <a
          routerLink="/"
          fragment="fluxo"
          class="nav-link"
        >
          Fluxo de Análise
        </a>

        <a
          routerLink="/"
          fragment="sobre"
          class="nav-link"
        >
          Sobre
        </a>
      </div>
    }

    <div class="flex flex-1 items-center justify-end gap-4 sm:gap-6">
      @if (isAuthenticated()) {
        <a
          routerLink="/dashboard"
          class="nav-link"
        >
          Dashboard
        </a>

        <a
          routerLink="/perfil"
          aria-label="Abrir perfil"
          class="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full bg-brand-50 text-xs font-semibold text-accent ring-1 ring-black/5 transition-colors duration-300 hover:ring-accent focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-accent"
        >
          @if (profile()?.avatar_url; as avatarUrl) {
            <img
              [src]="avatarUrl"
              alt=""
              class="h-full w-full object-cover"
            />
          } @else {
            {{ initials() }}
          }
        </a>
      } @else {
        <a
          routerLink="/login"
          class="navbar-cta-secondary"
        >
          Entrar
        </a>

        <a
          routerLink="/register"
          class="btn-primary navbar-cta"
        >
          Cadastrar
        </a>
      }
    </div>
  </div>
</nav>
