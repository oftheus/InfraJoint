<article
  class="group flex h-full min-h-[340px] min-w-0 flex-col rounded-lg p-7 shadow-[0_18px_50px_rgba(27,58,87,0.08)] transition-all duration-300 ease-out hover:-translate-y-2 hover:scale-[1.015] hover:shadow-[0_26px_70px_rgba(27,58,87,0.14)]"
  [style.background-color]="feature.cardColor"
>
  <div
    class="mx-auto flex h-24 w-24 shrink-0 items-center justify-center rounded-full transition-transform duration-300 group-hover:scale-105"
    [style.background-color]="feature.iconBackgroundColor"
    [style.color]="feature.iconColor"
  >
    @switch (feature.icon) {
      @case ('workflow') {
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
          class="h-11 w-11"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        >
          <path d="M6 6h.01" />
          <path d="M18 18h.01" />
          <path d="M18 6h.01" />
          <path d="M7 6h4a3 3 0 0 1 3 3v6a3 3 0 0 0 3 3h1" />
          <path d="M14 9a3 3 0 0 1 3-3h1" />
          <circle cx="6" cy="6" r="2.25" />
          <circle cx="18" cy="6" r="2.25" />
          <circle cx="18" cy="18" r="2.25" />
        </svg>
      }
      @case ('layers') {
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
          class="h-11 w-11"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        >
          <path d="m12 3 8 4.5-8 4.5-8-4.5L12 3Z" />
          <path d="m4 12 8 4.5 8-4.5" />
          <path d="m4 16.5 8 4.5 8-4.5" />
        </svg>
      }
      @case ('target') {
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
          class="h-11 w-11"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        >
          <circle cx="12" cy="12" r="8" />
          <circle cx="12" cy="12" r="3.5" />
          <path d="M12 2v3" />
          <path d="M12 19v3" />
          <path d="M2 12h3" />
          <path d="M19 12h3" />
        </svg>
      }
      @case ('timeline') {
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
          class="h-11 w-11"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        >
          <path d="M4 18V6" />
          <path d="M4 18h16" />
          <path d="M7 15.5 10.5 12l3 2.5L19 8" />
          <circle cx="10.5" cy="12" r="1.4" />
          <circle cx="14" cy="14.5" r="1.4" />
          <circle cx="19" cy="8" r="1.4" />
        </svg>
      }
      @case ('chart') {
        <svg
          viewBox="0 0 24 24"
          aria-hidden="true"
          class="h-11 w-11"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.8"
        >
          <path d="M4 19V5" />
          <path d="M4 19h16" />
          <path d="M8 16v-5" />
          <path d="M12 16V8" />
          <path d="M16 16v-7" />
          <path d="M8 8h8" />
        </svg>
      }
    }
  </div>

  <h3
    class="mt-11 max-w-full break-words text-xl font-semibold leading-snug text-[#1B3A57] [overflow-wrap:anywhere] xl:text-[1.05rem] 2xl:text-xl"
  >
    {{ feature.title }}
  </h3>

  <p class="mt-5 text-base leading-7 text-[#31506D]">
    {{ feature.description }}
  </p>
</article>
