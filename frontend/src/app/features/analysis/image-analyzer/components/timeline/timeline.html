<div class="rounded-2xl border border-gray-100 bg-white p-3">
  <div class="flex items-center gap-2">
    <!-- Playback -->
    <button
      type="button"
      class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-primary text-white transition-colors hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
      (click)="togglePlay()"
      [title]="playing() ? 'Pausar a reprodução' : 'Reproduzir o reaquecimento'"
      [attr.aria-label]="playing() ? 'Pausar' : 'Reproduzir'"
    >
      <svg [lucideIcon]="playing() ? 'pause' : 'play'" class="h-4 w-4" aria-hidden="true"></svg>
    </button>
    <div class="flex shrink-0 items-center gap-0.5 rounded-full border border-slate-200 bg-slate-50 p-0.5">
      @for (s of speeds; track s) {
        <button
          type="button"
          class="rounded-full px-2 py-0.5 text-[11px] font-medium transition-colors"
          [class]="speed() === s ? 'bg-primary text-white' : 'text-slate-500 hover:text-primary'"
          (click)="setSpeed(s)"
          [title]="'Velocidade ' + s + '×'"
        >
          {{ s }}×
        </button>
      }
    </div>
    <button
      type="button"
      class="filter-pill shrink-0 px-2.5 py-1 text-xs"
      (click)="step(-1)"
      title="Captura anterior (←)"
      aria-label="Captura anterior"
    >
      <svg [lucideIcon]="'chevron-left'" class="h-3.5 w-3.5" aria-hidden="true"></svg>
    </button>
    <button
      type="button"
      class="filter-pill shrink-0 px-2.5 py-1 text-xs"
      (click)="step(1)"
      title="Próxima captura (→)"
      aria-label="Próxima captura"
    >
      <svg [lucideIcon]="'chevron-right'" class="h-3.5 w-3.5" aria-hidden="true"></svg>
    </button>

    <!-- Position -->
    @if (active(); as cap) {
      <p class="ml-auto shrink-0 text-xs tabular-nums text-muted">
        <strong class="font-semibold text-primary">{{ displayLabel(cap) }}</strong>
        · t = {{ formatSeconds(cap.timeSeconds) }}
        · {{ activeIndex() + 1 }}/{{ captures().length }}
      </p>
    }
  </div>

  <!-- Filmstrip -->
  <div
    class="mt-3 flex gap-1.5 overflow-x-auto pb-1 outline-none focus-visible:rounded-lg focus-visible:ring-2 focus-visible:ring-accent/60"
    tabindex="0"
    role="listbox"
    aria-label="Capturas da sequência (setas navegam, espaço reproduz)"
    (keydown)="onKeyDown($event)"
  >
    @for (cap of captures(); track $index) {
      <button
        type="button"
        role="option"
        [attr.aria-selected]="$index === activeIndex()"
        class="relative shrink-0 overflow-hidden rounded-lg border-2 transition-colors"
        [class]="$index === activeIndex() ? 'border-accent' : 'border-transparent hover:border-slate-300'"
        [class.mr-2]="cap.kind === 'baseline'"
        (click)="select($index)"
        [title]="displayLabel(cap) + ' · t = ' + formatSeconds(cap.timeSeconds) + (cap.issue ? ' · ⚠ ' + cap.issue : '')"
      >
        @if (cap.thumbnail) {
          <img [src]="cap.thumbnail" [alt]="displayLabel(cap)" class="h-12 w-16 object-cover" />
        } @else {
          <span class="flex h-12 w-16 items-center justify-center bg-slate-100 text-slate-400">
            <svg [lucideIcon]="'image'" class="h-4 w-4" aria-hidden="true"></svg>
          </span>
        }
        <span
          class="absolute inset-x-0 bottom-0 truncate px-1 text-center text-[9px] font-semibold leading-4"
          [class]="cap.kind === 'baseline' ? 'bg-primary/80 text-white' : 'bg-black/45 text-white'"
        >
          {{ displayLabel(cap) }}
        </span>
        @if (cap.issue) {
          <span class="absolute right-0.5 top-0.5 rounded bg-amber-400 px-0.5 text-[9px]" aria-hidden="true">⚠</span>
        }
      </button>
    }
  </div>

  <!-- Scrub slider -->
  <input
    type="range"
    min="0"
    [max]="captures().length - 1"
    [value]="activeIndex()"
    (input)="onSliderInput($event)"
    class="mt-2 w-full accent-accent"
    aria-label="Posição na sequência"
    title="Arraste para navegar pelas capturas"
  />
</div>
