<div class="flex flex-col gap-3">
  <div class="flex items-center justify-between gap-3">
    <button
      type="button"
      (click)="back.emit()"
      class="inline-flex cursor-pointer items-center gap-2 rounded-full bg-brand-50 px-3 py-2 text-xs font-semibold text-primary transition-colors hover:bg-brand-100 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
    >
      <svg [lucideIcon]="'arrow-left'" class="h-4 w-4" aria-hidden="true"></svg>
      Voltar ao corpo
    </button>
    <p class="text-sm font-semibold text-primary">{{ title() }}</p>
  </div>

  <div
    class="relative mx-auto w-full max-w-[min(76vh,720px)] overflow-hidden rounded-2xl bg-white ring-1 ring-black/5"
    style="aspect-ratio: 1306 / 1204"
  >
    <img [src]="image()" [alt]="title()" class="absolute inset-0 h-full w-full object-contain" />

    @for (spot of hotspots(); track spot.jointId) {
      <button
        type="button"
        (click)="jointSelected.emit(spot.jointId)"
        [attr.aria-label]="'Avaliar ' + spot.label"
        class="group absolute h-8 w-8 -translate-x-1/2 -translate-y-1/2 cursor-pointer rounded-full focus:outline-none"
        [style.left.%]="spot.xPct"
        [style.top.%]="spot.yPct"
      >
        <span
          class="block h-full w-full rounded-full ring-2 shadow-md transition-transform duration-150 group-hover:scale-110 group-focus-visible:scale-110"
          [class.ring-white]="spot.analyzed"
          [class.ring-accent]="!spot.analyzed"
          [class.outline]="spot.selected"
          [class.outline-2]="spot.selected"
          [class.outline-offset-2]="spot.selected"
          [class.outline-primary]="spot.selected"
          [style.background-color]="spot.analyzed ? analyzedColor : 'rgba(255,255,255,0.15)'"
        ></span>
      </button>
    }
  </div>

  <p class="text-center text-xs text-muted">
    Toque em uma articulação destacada para registrar dor e/ou edema.
  </p>
</div>
