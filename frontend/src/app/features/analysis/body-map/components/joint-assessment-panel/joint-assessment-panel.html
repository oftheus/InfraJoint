<section
  class="flex flex-col gap-5 rounded-2xl border border-black/5 bg-surface p-5 shadow-[0_18px_50px_rgba(27,58,87,0.12)]"
  aria-label="Avaliação da articulação"
>
  <!-- Header -->
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <p class="text-[11px] font-semibold uppercase tracking-wider text-accent">
        Avaliação da articulação
      </p>
      <h2 class="mt-1 text-lg font-bold text-primary">{{ joint().label }}</h2>
      <p class="mt-0.5 font-mono text-xs text-muted">{{ joint().id }}</p>
    </div>

    <button
      type="button"
      (click)="closed.emit()"
      aria-label="Fechar painel de avaliação"
      class="inline-flex h-9 w-9 shrink-0 cursor-pointer items-center justify-center rounded-xl text-secondary transition-colors hover:bg-brand-50 hover:text-primary focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
    >
      <svg [lucideIcon]="'x'" class="h-5 w-5" aria-hidden="true"></svg>
    </button>
  </div>

  <!-- Current status -->
  <div class="flex items-center gap-2 rounded-xl bg-brand-50/60 px-3 py-2">
    <span
      class="h-3.5 w-3.5 rounded-full ring-2 ring-white"
      [style.background-color]="statusMeta().hex"
      aria-hidden="true"
    ></span>
    <span class="text-sm font-medium text-secondary">{{ statusMeta().label }}</span>
  </div>

  <!-- Pain -->
  <fieldset class="flex flex-col gap-2">
    <legend class="text-sm font-semibold text-ink-strong">Dor</legend>
    <div class="grid grid-cols-2 gap-2" role="group" aria-label="Dor">
      <button
        type="button"
        (click)="painChange.emit(true)"
        [class.bg-primary]="painValue() === true"
        [class.text-white]="painValue() === true"
        [class.border-primary]="painValue() === true"
        class="cursor-pointer rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-semibold text-secondary transition-colors hover:border-accent focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
      >
        Sim
      </button>
      <button
        type="button"
        (click)="painChange.emit(false)"
        [class.bg-primary]="painValue() === false"
        [class.text-white]="painValue() === false"
        [class.border-primary]="painValue() === false"
        class="cursor-pointer rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-semibold text-secondary transition-colors hover:border-accent focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
      >
        Não
      </button>
    </div>
  </fieldset>

  <!-- Swelling -->
  <fieldset class="flex flex-col gap-2">
    <legend class="text-sm font-semibold text-ink-strong">Edema (inchaço)</legend>
    <div class="grid grid-cols-2 gap-2" role="group" aria-label="Edema">
      <button
        type="button"
        (click)="swellingChange.emit(true)"
        [class.bg-primary]="swellingValue() === true"
        [class.text-white]="swellingValue() === true"
        [class.border-primary]="swellingValue() === true"
        class="cursor-pointer rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-semibold text-secondary transition-colors hover:border-accent focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
      >
        Sim
      </button>
      <button
        type="button"
        (click)="swellingChange.emit(false)"
        [class.bg-primary]="swellingValue() === false"
        [class.text-white]="swellingValue() === false"
        [class.border-primary]="swellingValue() === false"
        class="cursor-pointer rounded-xl border border-gray-200 px-4 py-2.5 text-sm font-semibold text-secondary transition-colors hover:border-accent focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-accent"
      >
        Não
      </button>
    </div>
  </fieldset>

  <!-- Clear -->
  @if (isEvaluated()) {
    <button
      type="button"
      (click)="cleared.emit()"
      class="inline-flex cursor-pointer items-center justify-center gap-2 self-start rounded-xl px-3 py-2 text-xs font-semibold text-red-500 transition-colors hover:bg-red-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-red-300"
    >
      <svg [lucideIcon]="'trash-2'" class="h-4 w-4" aria-hidden="true"></svg>
      Limpar avaliação
    </button>
  }
</section>
