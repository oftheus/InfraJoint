<section class="mx-auto max-w-[1320px] px-4 py-12 sm:px-6 lg:px-8">
  <div
    class="rounded-[28px] bg-[#F5F8FC] px-6 py-10 shadow-[0_20px_60px_rgba(27,58,87,0.08)] sm:px-10"
  >
    <div class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h2 class="mt-2 text-3xl font-semibold leading-tight text-[#1B3A57] sm:text-4xl">
          Fluxo de Aquisição e Análise
        </h2>
        <p class="mt-3 max-w-5xl text-sm leading-relaxed text-[#5C6673] sm:text-base">
          Protocolo de aquisição de imagens térmicas em 6 etapas estruturadas, desde a preparação do
          ambiente até a coleta de dados clínicos.
        </p>
      </div>
    </div>

    <app-phase-filter [activeFilter]="activeFilter" (filterChange)="onFilterChange($event)" />

    @if (steps.length === 0) {
      <p class="py-8 text-center text-sm text-gray-400">Nenhuma etapa encontrada.</p>
    } @else {
      <div class="mt-6">
        @for (step of steps; track step.id; let last = $last) {
          <app-step-card [step]="step" [isLast]="last" />
        }
      </div>
    }
  </div>
</section>
