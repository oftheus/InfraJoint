<ul class="flex flex-wrap items-center gap-x-4 gap-y-2">
  <li class="flex items-center gap-2">
    <span class="h-3 w-3 rounded-full ring-2 ring-accent" aria-hidden="true"></span>
    <span class="text-xs font-medium text-secondary">Não avaliada</span>
  </li>
  <li class="flex items-center gap-2">
    <span
      class="h-3 w-3 rounded-full ring-1 ring-black/10"
      [style.background-color]="analyzedColor"
      aria-hidden="true"
    ></span>
    <span class="text-xs font-medium text-secondary">Avaliada</span>
  </li>
</ul>
