<section id="hero" class="mx-auto max-w-[1320px] px-4 pb-16 pt-8 sm:px-6 sm:pb-20 sm:pt-6 lg:px-8">
  <div
    #heroSection
    class="relative isolate flex min-h-[calc(100vh-10rem)] overflow-hidden rounded-[2rem] px-6 py-16 shadow-[0_28px_80px_rgba(27,58,87,0.16)] sm:min-h-[calc(100vh-11rem)] sm:px-12 sm:py-20 lg:px-20"
  >
    <img
      #heroBackground
      src="assets/images/backgroundhome.png"
      alt=""
      aria-hidden="true"
      class="absolute inset-0 -z-20 h-full w-full object-cover [transform-origin:center_center] will-change-transform"
    />

    <div class="absolute inset-0 -z-10 bg-[#081827]/60"></div>
    <div
      class="absolute inset-0 -z-10 bg-gradient-to-r from-[#061B2E]/80 via-[#061B2E]/48 to-[#061B2E]/10"
    ></div>

    <div #heroContent class="flex max-w-3xl flex-col justify-center text-white">
      <p
        class="inline-flex w-fit items-center rounded-full bg-gradient-to-r from-[#32B5FE] via-[#32B5FE]/30 to-transparent px-3 py-1 text-[12px] tracking-[0.16em] text-white shadow-[0_14px_35px_rgba(50, 181, 254, 0.15)] sm:text-xs"
      >
        Pesquisa e inovação em reumatologia
      </p>

      <h1 class="mt-7 max-w-4xl text-4xl font-semibold leading-[1.08] sm:text-6xl lg:text-5xl">
        Plataforma de Análise Termográfica para Pesquisa em Reumatologia
      </h1>

      <p class="mt-6 max-w-[460px] text-base leading-8 text-white/85 sm:text-base">
        Conectando imagens termográficas, métodos computacionais e dados clínicos em um único
        ambiente de pesquisa.
      </p>

      <div class="mt-10 flex flex-wrap items-center gap-4">
        <a
          routerLink="/"
          fragment="sobre"
          class="inline-flex h-12 items-center justify-center rounded-full border border-white/55 px-7 text-sm font-semibold text-white transition-all duration-300 hover:-translate-y-0.5 hover:border-white hover:bg-white/15 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-white active:translate-y-0 sm:text-base"
        >
          Conhecer a plataforma
        </a>
      </div>
    </div>
  </div>
</section>
