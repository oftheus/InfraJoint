<section class="analysis-section">
  <div class="analysis-card">
    <div class="analysis-header">
      <div>
        <h2 class="section-title">Fluxo de Aquisição e Análise</h2>
        <p class="section-subtitle sm:text-base mt-5">
          Protocolo de aquisição de imagens térmicas em 6 etapas estruturadas, desde a preparação do
          ambiente até a coleta de dados clínicos.
        </p>
      </div>
    </div>

    <app-phase-filter [activeFilter]="activeFilter()" (filterChange)="onFilterChange($event)" />

    @if (steps().length === 0) {
      <p class="empty-state">Nenhuma etapa encontrada.</p>
    } @else {
      <div class="analysis-list">
        @for (step of steps(); track step.id; let last = $last) {
          <app-step-card [step]="step" [isLast]="last" />
        }
      </div>
    }
  </div>
</section>
